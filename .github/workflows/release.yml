name: Release

on:
  push:
    tags:
      - 'magic/v*'
      - 'lorcana/v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect icon set from tag
        id: detect
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == magic/v* ]]; then
            echo "icon=magic" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#magic/v}" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == lorcana/v* ]]; then
            echo "icon=lorcana" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#lorcana/v}" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown tag format: $TAG" >&2
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build font
        run: python scripts/build.py --icons ${{ steps.detect.outputs.icon }}

      - name: Package release assets
        id: package
        run: |
          ICON="${{ steps.detect.outputs.icon }}"
          VERSION="${{ steps.detect.outputs.version }}"
          ARCHIVE_NAME="${ICON}-${VERSION}"

          # Pack dist files
          cd dist
          zip -r "../${ARCHIVE_NAME}.zip" "${ICON}/"
          cd ..

          echo "archive=${ARCHIVE_NAME}.zip" >> "$GITHUB_OUTPUT"
          echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.detect.outputs.icon }} v${{ steps.detect.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.archive }}
